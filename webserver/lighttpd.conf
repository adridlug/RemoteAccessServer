server.modules = (
    "mod_cgi",
    "mod_openssl",
    "mod_accesslog"
)

# Server settings
server.port = 443
server.bind = "0.0.0.0"
server.document-root = "/var/www/remote-admin"

# HTTPS on port 443 using setup-generated self-signed certificate
$SERVER["socket"] == ":443" {
    ssl.engine = "enable"
    ssl.pemfile = "/etc/lighttpd/ssl/remote-admin.pem"
    ssl.openssl.ssl-conf-cmd = (
        "MinProtocol" => "TLSv1.2"
    )
}

# Keep only /info.cgi reachable via plain HTTP on port 8080.
$SERVER["socket"] == ":8080" {
    $HTTP["url"] !~ "^/info\\.cgi$" {
        url.access-deny = ( "" )
    }
}

# CGI configuration
cgi.assign = ( ".cgi" => "/var/www/remote-admin/venv/bin/python3" )

# Logging
server.errorlog = "/var/log/lighttpd/error.log"
accesslog.filename = "/var/log/lighttpd/access.log"

# MIME types
mimetype.assign = (
    ".html" => "text/html",
    ".css" => "text/css",
    ".txt" => "text/plain",
    ".xml" => "application/xml",
    ".cgi" => "application/x-httpd-cgi"
)

# Index files
index-file.names = ( "index.html", "index.cgi" )