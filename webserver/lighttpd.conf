server.modules = (
    "mod_cgi",
    "mod_accesslog"
)

# Server settings
server.port = 8080
server.bind = "0.0.0.0"
server.document-root = "/var/www/remote-admin"

# CGI configuration
cgi.assign = ( ".cgi" => "/var/www/remote-admin/venv/bin/python3" )

# Logging
server.errorlog = "/var/log/lighttpd/error.log"
accesslog.filename = "/var/log/lighttpd/access.log"

# MIME types
mimetype.assign = (
    ".html" => "text/html",
    ".css" => "text/css",
    ".txt" => "text/plain",
    ".xml" => "application/xml",
    ".cgi" => "application/x-httpd-cgi"
)

# Index files
index-file.names = ( "index.html", "index.cgi" )
